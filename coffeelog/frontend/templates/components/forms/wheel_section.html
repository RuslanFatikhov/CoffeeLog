<section class="form-section">
  <div class="wheel-ui">
    <h2 class="island_heading" data-i18n="wheel.title">Flavor Wheel</h2>
    <p class="p16 wheel-selected-label"><span data-create-wheel-selected-label data-i18n="wheel.placeholder">Tap + to add flavors</span></p>
    <input id="flavor_wheel" name="flavor_wheel" type="hidden" />
  </div>

  <div class="wheel-viewport create-wheel-viewport" data-create-wheel-viewport>
    <div class="wheel-center-focus" data-create-wheel-center-focus aria-live="polite">
      <img src="/static/icons/plus.svg">
      <span class="wheel-center-focus-text" data-create-wheel-center-focus-text>—

      </span>
    </div>
    <svg class="wheel-svg" data-create-wheel-svg viewBox="0 0 520 2000" aria-label="Coffee flavor wheel" data-i18n-aria-label="wheel.aria_label">
      <g data-create-wheel-root></g>
    </svg>
  </div>
</section>
